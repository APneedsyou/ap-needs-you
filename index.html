<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Needs You | Official Job Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans antialiased min-h-screen flex flex-col">

    <header class="border-b border-slate-800 bg-slate-900/80 backdrop-blur sticky top-0 z-50 py-4 px-6">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <span class="text-xl font-black tracking-wider text-teal-400">AP NEEDS YOU</span>
            </div>
            <span class="bg-teal-500/10 text-teal-400 border border-teal-500/20 px-3 py-1 rounded-full text-xs font-semibold tracking-wide uppercase">
                2026 Live Hub
            </span>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-6 py-12 flex-grow w-full">
        <div class="text-center max-w-2xl mx-auto mb-12">
            <h1 class="text-4xl font-extrabold tracking-tight text-white sm:text-5xl mb-4">
                Simplified Career Trackers
            </h1>
            <p class="text-lg text-slate-400">
                We track and filter long government PDFs into instant, clickable career updates for Andhra Pradesh youth.
            </p>
        </div>

        <div id="job-cards-container" class="grid gap-6 md:grid-cols-2">
            <div class="text-center col-span-full py-12 text-slate-500">Loading active opportunities...</div>
        </div>
    </main>

    <footer class="border-t border-slate-800 bg-slate-950 py-6 px-6 text-center text-sm text-slate-500">
        <p>© 2026 AP Needs You. All source links point directly to official government portals.</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
